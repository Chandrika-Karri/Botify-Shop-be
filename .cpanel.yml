deployment:
  tasks:
    - task: Build Backend
      commands:
        - echo "=============================="
        - echo "Starting backend deployment..."
        - echo "Using environment variables from cPanel"
        - echo "PORT: $PORT"
        - echo "STRIPE_SECRET_KEY: **** (hidden for security)"
        - echo "DATABASE_URL: **** (hidden for security)"
        - echo "=============================="

        # Install dependencies
        - echo "Installing Node.js dependencies..."
        - npm install --production
        - npm install --include=dev

        # Build TypeScript
        - echo "Building TypeScript backend..."
        - npm run build

        # Restart Node app
        - echo "Restarting Node.js backend..."
        - pm2 stop botify-backend || true
        - pm2 start dist/index.js --name botify-backend --env production

        - echo "Backend deployment complete!"