---
deployment:
  tasks:
    - task: "Install Dependencies"
      commands:
        - echo "=============================="
        - echo "Installing Node.js dependencies..."
        - npm ci --production
        - npm install --include=dev
        - echo "Dependencies installed."
        - echo "=============================="

    - task: "Build TypeScript Backend"
      commands:
        - echo "=============================="
        - echo "Building TypeScript backend..."
        - npm run build
        - echo "TypeScript build complete."
        - echo "=============================="

    - task: "Restart Node.js App"
      commands:
        - echo "=============================="
        - echo "Restarting Node.js backend via PM2..."
        - pm2 stop botify-backend || true
        - pm2 start dist/index.js --name botify-backend --env production
        - echo "Backend deployment complete!"
        - echo "=============================="